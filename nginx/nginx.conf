# nginx/nginx.conf — SIGPOL Proxy Reverso

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
  use epoll;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Log format com IP real
  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent"';

  access_log /var/log/nginx/access.log main;

  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  server_tokens off;          # Oculta versão do Nginx

  # Compressão
  gzip on;
  gzip_types text/plain application/json application/javascript text/css;
  gzip_min_length 1000;

  # Rate limit por IP
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
  limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

  # ── Upstream: backend Node.js ──────────────────────────
  upstream sigpol_api {
    server backend:3001;
    keepalive 32;
  }

  # ── Upstream: frontend React ───────────────────────────
  upstream sigpol_frontend {
    server frontend:80;
  }

  # ── HTTP → HTTPS redirect ──────────────────────────────
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # ── HTTPS principal ────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name sigpol.pmesp.sp.gov.br;    # Alterar para domínio real

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Headers de segurança
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # API Backend
    location /api/ {
      limit_req zone=api burst=20 nodelay;

      proxy_pass         http://sigpol_api;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;

      proxy_read_timeout  60s;
      proxy_send_timeout  60s;
      client_max_body_size 5m;
    }

    # Rate limit extra no login
    location /api/v1/auth/login {
      limit_req zone=login burst=3 nodelay;
      proxy_pass http://sigpol_api;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # WebSocket (para atualizações em tempo real — Fase 3)
    location /ws/ {
      proxy_pass         http://sigpol_api;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "Upgrade";
      proxy_set_header   Host $host;
      proxy_read_timeout 86400s;
    }

    # Frontend React
    location / {
      proxy_pass http://sigpol_frontend;
      proxy_set_header Host $host;

      # Cache para assets estáticos
      location ~* \.(js|css|png|jpg|ico|svg|woff2)$ {
        proxy_pass http://sigpol_frontend;
        expires 7d;
        add_header Cache-Control "public, immutable";
      }
    }
  }
}
